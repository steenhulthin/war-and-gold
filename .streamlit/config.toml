[server]
enableStaticServing = true

[[theme.fontFaces]]
family = "Inter"
url = "static/Inter_18pt-Regular.ttf"
style = "normal"
weight = 400

[[theme.fontFaces]]
family = "Inter"
url = "static/Inter_18pt-Medium.ttf"
style = "normal"
weight = 500

[[theme.fontFaces]]
family = "Inter"
url = "static/Inter_18pt-SemiBold.ttf"
style = "normal"
weight = 600

[[theme.fontFaces]]
family = "Inter"
url = "static/Inter_18pt-Bold.ttf"
style = "normal"
weight = 700

[[theme.fontFaces]]
family = "SourceCodePro"
url = "static/SourceCodePro-Regular.ttf"
style = "normal"
weight = 400

[[theme.fontFaces]]
family = "SourceCodePro"
url = "static/SourceCodePro-SemiBold.ttf"
style = "normal"
weight = 600

[theme]
primaryColor = "#1e3a8a"
backgroundColor = "#fefefe"
secondaryBackgroundColor = "#f8fafc"
textColor = "#1f2937"
linkColor = "#1e40af"
borderColor = "#d1d5db"
showWidgetBorder = true
baseRadius = "0.375rem"
font = "Inter"
headingFont = "Inter"
codeFont = "SourceCodePro"
codeBackgroundColor = "#f3f4f6"
showSidebarBorder = true

[theme.sidebar]
backgroundColor = "#f1f5f9"
secondaryBackgroundColor = "#e5e7eb"
